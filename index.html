<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heritage Fishing Co. — Feed Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 { font-family: 'DM Serif Display', serif; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    table, th, td { border: 1px solid #ccc; }
    th, td { padding: 10px; text-align: left; }
    form { margin-bottom: 20px; }
    input, button { padding: 8px; margin: 5px 0; width: 100%; }
    button { cursor: pointer; background-color: #007BFF; color: #fff; border: none; }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>
  <h1>Heritage Fishing Co. — Feed Tracker</h1>

  <!-- Display Stock Table -->
  <h2>Current Feed Stock</h2>
  <table id="stockTable">
    <thead>
      <tr>
        <th>Feed Name</th>
        <th>Bags Available</th>
      </tr>
    </thead>
    <tbody id="stockBody">
      <tr><td colspan="2">Loading...</td></tr>
    </tbody>
  </table>

  <!-- Add Feed Usage Form -->
  <h2>Record Feed Usage</h2>
  <form id="usageForm">
    <input type="text" id="feedName" placeholder="Feed Name" required>
    <input type="number" id="amountUsed" placeholder="Amount Used (bags)" required>
    <button type="submit">Submit Usage</button>
  </form>

  <script>
    const SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMWxbK8ssEix4IQTxco5abFN8vKv2dQq9XyuKjKMUuMZkf9tyAPk7WRzCJKI_QYpRQXgpvw2hXbHCVIu-NN6yI-F1vpF9gfruL0IiXUHyV83FQdLvuvBm13dbksuVK71E2YauxBSkwE7iWUqEoPQn8OzL_mHc8Sx0wn72FMAjAvW1kCvh6UamCS6rH-fKG4SkAU1Y662fKl2Wk-r1qYHg7FuT5PxYyraqHqFpWGmmo9lM4ohnaTVtYB0MLmNwA6FUOfaripCdHVqHTDNnivNe2SlDEPFpdd98Xw0Uyd8RP6oeLdx2cM&lib=MJCRb-wQ8faR_B5lRbFru26VCeBv4GP1Z";

    // Fetch stock from Apps Script
    async function loadStock() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getStock`);
        const data = await response.json();
        const tbody = document.getElementById('stockBody');
        if (!data.stock || data.stock.length === 0) {
          tbody.innerHTML = `<tr><td colspan="2">No stock available</td></tr>`;
          return;
        }
        tbody.innerHTML = data.stock.map(item => `
          <tr>
            <td>${item.feedName}</td>
            <td>${item.bags}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error("Error loading stock:", err);
        document.getElementById('stockBody').innerHTML = `<tr><td colspan="2">Error loading stock</td></tr>`;
      }
    }

    // Submit feed usage to Apps Script
    document.getElementById('usageForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const feedName = document.getElementById('feedName').value.trim();
      const amount = parseFloat(document.getElementById('amountUsed').value);

      if (!feedName || isNaN(amount) || amount <= 0) return alert("Enter valid values");

      const payload = { action: "recordUsage", feedName, amount };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          headers: { "Content-Type": "application/json" }
        });
        const result = await response.json();
        alert(result.message || "Usage recorded successfully!");
        document.getElementById('usageForm').reset();
        loadStock(); // Refresh table
      } catch (err) {
        console.error("Error recording usage:", err);
        alert("Failed to record usage");
      }
    });

    // Load stock on page load
    window.onload = loadStock;
  </script>
</body>
</html>
